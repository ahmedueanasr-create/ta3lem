version: '3.9'

volumes:
  mysql_data:
  redis_data:

services:
  mysql:
    image: mysql:8.0
    container_name: ta3lem_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-ta3lem}
      MYSQL_USER: ${DB_USER:-ta3lem}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ta3lempass}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ta3lem_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ta3lem-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ta3lem_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_NAME: ${APP_NAME:-ta3lem}
      APP_URL: ${APP_URL:-https://ta3lem.example.com}
      CLIENT_URL: ${CLIENT_URL:-https://ta3lem.example.com}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ta3lem}
      DB_USER: ${DB_USER:-ta3lem}
      DB_PASSWORD: ${DB_PASSWORD:-ta3lempass}
      DB_POOL_MIN: 5
      DB_POOL_MAX: 50
      DB_LOGGING: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      JWT_ISSUER: ta3lem
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
      UPLOAD_DIR: /app/storage/uploads
      RECORDING_DIR: /app/storage/recordings
      MAX_UPLOAD_MB: 200
      LIVE_PROVIDER: ${LIVE_PROVIDER:-livekit}
      LIVEKIT_HOST: ${LIVEKIT_HOST:-http://livekit:7880}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      AGORA_APP_ID: ${AGORA_APP_ID:-}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-}
      WA_ENABLED: ${WA_ENABLED:-true}
      WA_SESSION_DIR: /app/storage/wa-session
      WA_GROUP_NOTIFY: ${WA_GROUP_NOTIFY:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILE: 'true'
    ports:
      - '4000:4000'
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/recordings:/app/storage/recordings
      - ./storage/wa-session:/app/storage/wa-session

  livekit:
    image: livekit/livekit-server:latest
    container_name: ta3lem_livekit
    restart: unless-stopped
    command: --dev --node-ip=127.0.0.1
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro

  nginx:
    image: nginx:alpine
    container_name: ta3lem_nginx
    restart: unless-stopped
    depends_on:
      - ta3lem-api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/uploads:/var/www/storage/uploads:ro
      - ./storage/recordings:/var/www/storage/recordings:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
